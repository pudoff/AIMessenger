name: deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: login to docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: set docker tags
        id: vars
        run: |
          echo "tag_latest=main-latest" >> $GITHUB_OUTPUT
          echo "tag_sha=main-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            DOCKERHUBNAME/aimessenger:webhook-${{ steps.vars.outputs.tag_latest }}
            DOCKERHUBNAME/aimessenger:webhook-${{ steps.vars.outputs.tag_sha }}
