services:
  postgres:
    image: postgres:17-alpine
    container_name: aimessenger-postgres
    environment:
      POSTGRES_DB: aimessenger
      POSTGRES_USER: aimessenger
      POSTGRES_PASSWORD: aimessenger
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
