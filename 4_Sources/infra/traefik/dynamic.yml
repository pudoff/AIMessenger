http:
  middlewares:
    rate-limiter:
      rateLimit:
        average: 100
        burst: 200

    common-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true

    basic-auth:
      basicAuth:
        usersFile: /etc/traefik/usersfile

  routers:
    traefik-dashboard:
      rule: "Host(`traefik.DOMAIN.ru`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - basic-auth
      tls:
        certResolver: traefik

    frontend:
      rule: "Host(`DOMAIN.ru`)"
      entryPoints:
        - websecure
      service: frontend
      tls:
        certResolver: traefik
      middlewares:
        - basic-auth
        - rate-limiter
        - common-headers

    backend:
      rule: "Host(`api.DOMAIN.ru`)"
      entryPoints:
        - websecure
      service: backend
      tls:
        certResolver: traefik
      middlewares:
        - rate-limiter
        - common-headers

    webhook:
      rule: "Host(`SUBDOMAIN.DOMAIN.ru`)"
      entryPoints:
        - websecure
      service: webhook
      tls:
        certResolver: traefik
      middlewares:
        - rate-limiter
        - common-headers

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:4000"

    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

