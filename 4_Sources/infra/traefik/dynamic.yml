http:
  middlewares:
    rate-limiter:
      rateLimit:
        average: 100
        burst: 200

    common-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true

    basic-auth:
      basicAuth:
        usersFile: /etc/traefik/usersfile

  routers:
    frontend:
      rule: "Host(`elephantaimessenger.ru`)"
      entryPoints:
        - websecure
      service: frontend
      tls:
        certResolver: traefik
      middlewares:
        - rate-limiter
        - common-headers

    backend:
      rule: "Host(`api.elephantaimessenger.ru`)"
      entryPoints:
        - websecure
      service: backend
      tls:
        certResolver: traefik
      middlewares:
        - rate-limiter
        - common-headers

    dozzle:
      rule: "Host(`dozzle.elephantaimessenger.ru`)"
      entryPoints:
        - websecure
      service: dozzle
      tls:
        certResolver: traefik
      middlewares:
        - basic-auth
        - rate-limiter
        - common-headers

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"

    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    dozzle:
      loadBalancer:
        servers:
          - url: "http://dozzle:8080"

    webhook:
      loadBalancer:
        servers:
          - url: "http://webhook:3000"
