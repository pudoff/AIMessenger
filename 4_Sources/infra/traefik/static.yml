api:
  dashboard: true
  insecure: false

log:
  level: DEBUG

accessLog:
  addInternals: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: traefik

providers:
  file:
    directory: /etc/traefik/conf.d
    watch: true

certificatesResolvers:
  traefik:
    acme:
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web