name: aimessenger

services:
  traefik:
    image: traefik:3.6.9
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/traefik/static.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/conf.d/dynamic.yml:ro
      - ./infra/traefik/usersfile:/etc/traefik/usersfile:ro
      - aimessenger_traefik_acme:/etc/traefik/acme
    networks:
      - backend
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

  backend:
    image: magnificent8/ai-messenger:backend-latest
    container_name: backend
    restart: always
    volumes:
      - ./.env:/app/.env:ro
      - aimessenger_static_data:/app/staticfiles
      - aimessenger_media_data:/app/media
    env_file:
      - path: ./celery.env
        required: false
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ML_CELERY_QUEUE: ml
      BACKEND_CELERY_QUEUE: backend
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MEDIA_ROOT: /app/media
      SERVE_MEDIA_FILES: ${SERVE_MEDIA_FILES:-True}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    entrypoint: /app/entrypoint.sh
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  backend-worker:
    image: magnificent8/ai-messenger:backend-latest
    container_name: backend-worker
    restart: always
    volumes:
      - ./.env:/app/.env:ro
    env_file:
      - path: ./celery.env
        required: false
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ML_CELERY_QUEUE: ml
      BACKEND_CELERY_QUEUE: backend
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    command: >
      sh -c 'export CELERY_TASK_TIME_LIMIT="$${BACKEND_CELERY_TASK_TIME_LIMIT:-300}";
      export CELERY_TASK_SOFT_TIME_LIMIT="$${BACKEND_CELERY_TASK_SOFT_TIME_LIMIT:-240}";
      export CELERY_WORKER_PREFETCH_MULTIPLIER="$${BACKEND_CELERY_WORKER_PREFETCH_MULTIPLIER:-1}";
      celery -A config worker -Q backend --loglevel=info
      --concurrency="$${BACKEND_CELERY_WORKER_CONCURRENCY:-2}"
      --prefetch-multiplier="$${BACKEND_CELERY_WORKER_PREFETCH_MULTIPLIER:-1}"
      --max-tasks-per-child="$${BACKEND_CELERY_WORKER_MAX_TASKS_PER_CHILD:-100}"'
    networks:
      - backend
    depends_on:
      ml-worker:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    image: magnificent8/ai-messenger:frontend-latest
    container_name: frontend
    restart: always
    networks:
      - backend
    depends_on:
      backend:
        condition: service_started

  ml-worker:
    image: magnificent8/ai-messenger:ml-latest
    container_name: ml-worker
    restart: always
    env_file:
      - path: ./celery.env
        required: false
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_QUEUE: ml
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    restart: always
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - aimessenger_pgvector_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 1s
      retries: 10
      start_period: 5s
      start_interval: 1s

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  dozzle:
    image: amir20/dozzle:v10.0.6
    container_name: dozzle
    environment:
      DOZZLE_BASE: /
      DOZZLE_FILTER: ""
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend

volumes:
  aimessenger_pgvector_data:
  aimessenger_static_data:
  aimessenger_media_data:
  aimessenger_traefik_acme:

networks:
  backend:
    driver: bridge
